<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Pinangan Bana & Bella — Slide Online</title>
    <meta
      name="description"
      content="Galeri foto online Pinangan Bana & Bella. Lihat momen-momen indah dalam slideshow yang elegan."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Background blur layer -->
    <div id="bg-container">
      <div class="bg-layer active" id="bg-current"></div>
      <div class="bg-layer" id="bg-next"></div>
      <div class="bg-overlay"></div>
    </div>

    <!-- Floating particles -->
    <div id="particles"></div>

    <!-- Main app -->
    <main class="app">
      <!-- Header -->
      <header class="header" id="header">
        <div class="header-left">
          <div class="brand">
            <div class="brand-icon">
              <img
                src="logos/LOGO BB GOLD.png"
                alt="Logo Pinangan Bana & Bella"
              />
            </div>
            <div class="brand-text">
              <h1>Pinangan Bana & Bella</h1>
              <p class="brand-subtitle">Slide Online</p>
            </div>
          </div>
        </div>
        <div class="header-right">
          <div class="counter-pill" id="counter-pill">
            <span id="current-num">1</span>
            <span class="counter-divider">/</span>
            <span id="total-num">174</span>
          </div>
          <button class="icon-btn" id="fullscreen-btn" aria-label="Fullscreen">
            <svg
              id="fs-expand"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"
              />
            </svg>
            <svg
              id="fs-collapse"
              class="hidden"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M8 3v3a2 2 0 01-2 2H3m18 0h-3a2 2 0 01-2-2V3m0 18v-3a2 2 0 012-2h3M3 16h3a2 2 0 012 2v3"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- Slideshow -->
      <section class="slideshow" id="slideshow">
        <!-- Navigation arrows -->
        <button
          class="nav-arrow nav-prev"
          id="prev-btn"
          aria-label="Foto sebelumnya"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m15 18-6-6 6-6" />
          </svg>
        </button>

        <div class="slide-viewport" id="slide-viewport">
          <div class="slide-track" id="slide-track">
            <!-- Slides generated by JS -->
          </div>
          <div class="slide-loader" id="slide-loader">
            <div class="loader-ring"></div>
          </div>
        </div>

        <button
          class="nav-arrow nav-next"
          id="next-btn"
          aria-label="Foto berikutnya"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>
      </section>

      <!-- Bottom controls -->
      <div class="controls" id="controls">
        <div class="controls-left">
          <button class="control-btn" id="play-btn" aria-label="Play / Pause">
            <svg
              id="icon-play"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            <svg
              id="icon-pause"
              class="hidden"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="6" y="4" width="4" height="16" />
              <rect x="14" y="4" width="4" height="16" />
            </svg>
          </button>
        </div>

        <div class="controls-center">
          <div class="progress-track" id="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
            <div class="progress-thumb" id="progress-thumb"></div>
          </div>
        </div>

        <div class="controls-right">
          <div class="speed-selector" id="speed-selector">
            <button class="speed-btn active" data-speed="3000">3s</button>
            <button class="speed-btn" data-speed="5000">5s</button>
            <button class="speed-btn" data-speed="8000">8s</button>
          </div>
        </div>
      </div>

      <!-- Thumbnail strip -->
      <div class="thumb-strip" id="thumb-strip">
        <!-- Thumbnails generated by JS -->
      </div>
    </main>

    <!-- Lightbox overlay -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightbox-close" aria-label="Tutup">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
      <img id="lightbox-img" src="" alt="Full size photo" />
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
